<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finca Serenity | San Rafael, Ibiza</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-paper: #F5F2E9;
            --text-main: #333333;
            --text-sub: #5A5A5A;
            --accent: #8C8C8C;
            --gold: #C5A258;
            --gold-soft: rgba(197, 162, 88, 0.15);
        }

        html,
        body {
            height: 100%;
            font-family: 'Cormorant', serif;
            font-weight: 300;
            color: var(--text-main);
            overflow: hidden;
        }

        /* ───── HERO BACKGROUND ───── */
        .hero {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .hero video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 80% 70% at 50% 45%,
                    rgba(0, 0, 0, 0.15) 0%,
                    rgba(0, 0, 0, 0.55) 100%);
            z-index: 1;
        }

        /* ───── GRAIN TEXTURE ───── */
        .grain {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
            opacity: 0.05;
            mix-blend-mode: multiply;
        }

        /* ───── MAIN LAYOUT ───── */
        .landing {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* ───── BRANDING ───── */
        .brand {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeDown 1.2s ease-out;
        }

        .brand h1 {
            font-size: clamp(2rem, 5vw, 3.4rem);
            font-weight: 300;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
            text-indent: 0.45em;
            line-height: 1.3;
        }

        .brand .divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.35), transparent);
            margin: 1rem auto;
        }

        .brand .tagline {
            font-size: clamp(0.85rem, 1.5vw, 1.05rem);
            font-style: italic;
            letter-spacing: 0.25em;
            color: rgba(255, 255, 255, 0.45);
        }

        /* ───── GATE CARD ───── */
        .gate {
            width: 100%;
            max-width: 440px;
            background: rgba(245, 242, 233, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 4px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            animation: fadeUp 1.2s ease-out 0.3s both;
        }

        /* ── Tab Toggle ── */
        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .tab {
            flex: 1;
            padding: 1.1rem 1rem;
            text-align: center;
            font-family: 'Cormorant', serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            background: transparent;
            border: none;
            cursor: pointer;
            transition: color 0.3s, background 0.3s;
            position: relative;
        }

        .tab::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 2px;
            background: var(--text-main);
            transition: width 0.3s ease;
        }

        .tab.active {
            color: var(--text-main);
        }

        .tab.active::after {
            width: 40%;
        }

        .tab:hover {
            color: var(--text-main);
        }

        /* ── Panels ── */
        .panel {
            display: none;
            padding: 2.2rem 2rem 2rem;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .panel p.intro {
            font-size: 1rem;
            font-style: italic;
            color: var(--text-sub);
            line-height: 1.8;
            margin-bottom: 1.6rem;
            text-align: center;
        }

        /* ── Form Elements ── */
        label {
            display: block;
            font-size: 0.8rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.4rem;
            font-weight: 500;
        }

        input,
        textarea {
            width: 100%;
            font-family: 'Cormorant', serif;
            font-size: 1.05rem;
            font-weight: 400;
            padding: 0.75rem 0;
            border: none;
            border-bottom: 1px solid rgba(0, 0, 0, 0.12);
            background: transparent;
            color: var(--text-main);
            outline: none;
            transition: border-color 0.3s;
            margin-bottom: 1.4rem;
        }

        input:focus,
        textarea:focus {
            border-bottom-color: var(--text-main);
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(0, 0, 0, 0.2);
            font-style: italic;
        }

        textarea {
            resize: none;
            height: 80px;
            line-height: 1.6;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            font-family: 'Cormorant', serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: white;
            background: var(--text-main);
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.3s, transform 0.15s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: #1a1a1a;
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* ── Feedback Messages ── */
        .msg {
            text-align: center;
            font-size: 0.9rem;
            margin-top: 1rem;
            min-height: 1.4em;
            font-style: italic;
            transition: opacity 0.3s;
        }

        .msg.error {
            color: #B4464B;
        }

        .msg.success {
            color: #4A7C59;
        }

        /* ── Success State ── */
        .success-view {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-view.show {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        .success-view .check {
            width: 48px;
            height: 48px;
            border: 2px solid #4A7C59;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            color: #4A7C59;
            font-size: 1.4rem;
        }

        .success-view h3 {
            font-size: 1.3rem;
            font-weight: 400;
            font-style: italic;
            color: var(--text-main);
            margin-bottom: 0.8rem;
        }

        .success-view p {
            font-size: 0.95rem;
            color: var(--text-sub);
            line-height: 1.7;
        }

        /* ── Admin Panel ── */
        .admin-panel {
            display: none;
            padding: 1.8rem 2rem;
            max-height: 60vh;
            overflow-y: auto;
        }

        .admin-panel.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .admin-panel h3 {
            font-size: 1.15rem;
            font-weight: 500;
            font-style: italic;
            color: var(--text-main);
            margin-bottom: 1.2rem;
            text-align: center;
        }

        .admin-panel .empty {
            text-align: center;
            color: var(--accent);
            font-style: italic;
            padding: 1.5rem 0;
        }

        .request-card {
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 3px;
            padding: 1rem 1.2rem;
            margin-bottom: 0.8rem;
            background: rgba(255, 255, 255, 0.5);
        }

        .request-card .req-name {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 0.2rem;
        }

        .request-card .req-email {
            font-size: 0.85rem;
            color: var(--accent);
            margin-bottom: 0.3rem;
        }

        .request-card .req-msg {
            font-size: 0.9rem;
            font-style: italic;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 0.6rem;
        }

        .request-card .req-date {
            font-size: 0.75rem;
            color: var(--accent);
            margin-bottom: 0.8rem;
        }

        .request-card .req-status {
            display: inline-block;
            font-size: 0.72rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0.25rem 0.6rem;
            border-radius: 2px;
            font-weight: 500;
        }

        .req-status.pending {
            background: rgba(197, 162, 88, 0.15);
            color: #A68A3E;
        }

        .req-status.approved {
            background: rgba(74, 124, 89, 0.12);
            color: #4A7C59;
        }

        .req-status.denied {
            background: rgba(180, 70, 75, 0.1);
            color: #B4464B;
        }

        .request-card .actions {
            margin-top: 0.8rem;
            display: flex;
            gap: 0.5rem;
        }

        .request-card .actions button {
            flex: 1;
            padding: 0.5rem 0.8rem;
            font-family: 'Cormorant', serif;
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .request-card .actions button:hover {
            opacity: 0.8;
        }

        .btn-approve {
            background: #4A7C59;
            color: white;
        }

        .btn-deny {
            background: #B4464B;
            color: white;
        }

        .admin-logout {
            display: block;
            margin: 1rem auto 0;
            padding: 0.6rem 1.2rem;
            font-family: 'Cormorant', serif;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(0, 0, 0, 0.15);
            color: var(--accent);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .admin-logout:hover {
            border-color: var(--text-main);
            color: var(--text-main);
        }

        /* ── Footer ── */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 2;
            text-align: center;
            padding: 1.2rem;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.75rem;
            letter-spacing: 0.15em;
        }

        /* ── Animations ── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .gate {
                max-width: 100%;
            }

            .panel {
                padding: 1.8rem 1.4rem 1.6rem;
            }

            .brand {
                margin-bottom: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="hero">
        <video autoplay muted loop playsinline poster="Photos/Confirmed/The%20Estate%20(P1).jpg">
            <source src="Teaser - 30s Exterior.mp4" type="video/mp4">
        </video>
    </div>
    <div class="grain"></div>

    <!-- Main Content -->
    <div class="landing">

        <!-- Branding -->
        <div class="brand">
            <h1>Finca Serenity</h1>
            <div class="divider"></div>
            <p class="tagline">San Rafael, Ibiza</p>
        </div>

        <!-- Gate Card -->
        <div class="gate" id="gateCard">

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-panel="code-panel" onclick="switchTab(this)">Enter Code</button>
                <button class="tab" data-panel="apply-panel" onclick="switchTab(this)">Request Access</button>
            </div>

            <!-- Panel: Enter Code -->
            <div class="panel active" id="code-panel">
                <p class="intro">Enter your unique authentication code.</p>
                <form id="codeForm" onsubmit="return handleCode(event)">
                    <label for="accessCode">Access Code</label>
                    <input type="password" id="accessCode" name="accessCode" placeholder="Enter your code"
                        autocomplete="off" required>
                    <button type="submit" class="btn">Enter</button>
                    <div class="msg" id="codeMsg"></div>
                </form>
            </div>

            <!-- Panel: Request Access -->
            <div class="panel" id="apply-panel">
                <p class="intro">Request an authentication code.</p>
                <form id="applyForm" onsubmit="return handleApply(event)">
                    <label for="guestName">Full Name</label>
                    <input type="text" id="guestName" name="guestName" placeholder="Your name" required>

                    <label for="guestEmail">Email</label>
                    <input type="email" id="guestEmail" name="guestEmail" placeholder="Your email" required>

                    <label for="guestMessage">A Brief Introduction</label>
                    <textarea id="guestMessage" name="guestMessage"
                        placeholder="Tell us a little about your interest..."></textarea>

                    <button type="submit" class="btn">Submit Request</button>
                    <div class="msg" id="applyMsg"></div>
                </form>
            </div>

            <!-- Success View (replaces panels after auth) -->
            <div class="success-view" id="successView">
                <div class="check">&#10003;</div>
                <h3>Welcome</h3>
                <p>Redirecting you to the estate...</p>
            </div>

            <!-- Admin Panel (visible after admin auth) -->
            <div class="admin-panel" id="adminPanel">
                <a href="home.html" class="btn" style="display:block; text-align:center; margin-bottom:1.5rem; background:#4A7C59; color:white;">Enter Site</a>
                <h3>Access Requests</h3>
                <div id="requestsList"></div>
                <button class="admin-logout" onclick="adminLogout()">Log Out</button>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <div class="footer">&copy; 2026 Finca Serenity. By invitation only.</div>

    <script>
        // ── CONFIG ──
        const ADMIN_CODE = 'FincaSerenity1234?!';

        // ── REQUESTS STORAGE (localStorage) ──
        function getRequests() {
            return JSON.parse(localStorage.getItem('finca_requests') || '[]');
        }

        function saveRequests(requests) {
            localStorage.setItem('finca_requests', JSON.stringify(requests));
        }

        function getGuestCodes() {
            return JSON.parse(localStorage.getItem('finca_guest_codes') || '[]');
        }

        function saveGuestCodes(codes) {
            localStorage.setItem('finca_guest_codes', JSON.stringify(codes));
        }

        // ── TAB SWITCHING ──
        function switchTab(btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(btn.dataset.panel).classList.add('active');
            document.querySelectorAll('.msg').forEach(m => { m.textContent = ''; m.className = 'msg'; });
        }

        // ── CODE AUTH ──
        function handleCode(e) {
            e.preventDefault();
            const code = document.getElementById('accessCode').value.trim();
            const msg = document.getElementById('codeMsg');

            if (code === ADMIN_CODE) {
                msg.textContent = '';
                showAdmin();
                return false;
            }

            // Check guest codes
            const guestCodes = getGuestCodes();
            if (guestCodes.includes(code.toUpperCase())) {
                msg.textContent = '';
                showSuccess('guest');
                return false;
            }

            msg.textContent = 'Invalid code. Please try again or request access.';
            msg.className = 'msg error';
            document.getElementById('accessCode').value = '';
            document.getElementById('accessCode').focus();
            return false;
        }

        // ── APPLICATION ──
        function handleApply(e) {
            e.preventDefault();
            const name = document.getElementById('guestName').value.trim();
            const email = document.getElementById('guestEmail').value.trim();
            const message = document.getElementById('guestMessage').value.trim();
            const msg = document.getElementById('applyMsg');

            if (!name || !email) {
                msg.textContent = 'Please provide your name and email.';
                msg.className = 'msg error';
                return false;
            }

            const requests = getRequests();
            requests.push({
                id: Date.now(),
                name,
                email,
                message,
                status: 'pending',
                timestamp: new Date().toISOString()
            });
            saveRequests(requests);

            showSuccess('apply');
            return false;
        }

        // ── SUCCESS STATE ──
        function showSuccess(type) {
            const successView = document.getElementById('successView');
            const tabs = document.querySelector('.tabs');

            tabs.style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

            if (type === 'guest') {
                successView.querySelector('h3').textContent = 'Welcome';
                successView.querySelector('p').textContent = 'Redirecting you to the estate...';
                successView.classList.add('show');
                setTimeout(() => { window.location.href = 'home.html'; }, 2000);
            } else {
                successView.querySelector('h3').textContent = 'Request Received';
                successView.querySelector('p').textContent =
                    'Thank you for your interest. We will review your enquiry and be in touch shortly.';
                successView.classList.add('show');
            }
        }

        // ── ADMIN PANEL ──
        function showAdmin() {
            const tabs = document.querySelector('.tabs');
            const adminPanel = document.getElementById('adminPanel');

            tabs.style.display = 'none';
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('successView').classList.remove('show');

            adminPanel.classList.add('show');
            renderRequests();
        }

        function generateCode(name) {
            const clean = name.replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 6);
            const rand = Math.random().toString(36).substring(2, 6).toUpperCase();
            return 'FS-' + clean + '-' + rand;
        }

        function renderRequests() {
            const list = document.getElementById('requestsList');
            const requests = getRequests();

            if (requests.length === 0) {
                list.innerHTML = '<p class="empty">No access requests yet.</p>';
                return;
            }

            requests.sort((a, b) => {
                if (a.status === 'pending' && b.status !== 'pending') return -1;
                if (a.status !== 'pending' && b.status === 'pending') return 1;
                return new Date(b.timestamp) - new Date(a.timestamp);
            });

            list.innerHTML = requests.map(req => {
                const date = new Date(req.timestamp).toLocaleDateString('en-GB', {
                    day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                const statusClass = req.status;

                let actions = '';
                if (req.status === 'pending') {
                    actions = `<div class="actions">
                         <button class="btn-approve" onclick="approveRequest(${req.id})">Approve</button>
                         <button class="btn-deny" onclick="updateRequest(${req.id}, 'denied')">Deny</button>
                       </div>`;
                } else if (req.status === 'approved' && req.guestCode) {
                    actions = `<div style="margin-top:0.6rem; font-size:0.82rem; color: #4A7C59; letter-spacing:0.08em;">
                        Code: <strong>${req.guestCode}</strong>
                    </div>`;
                }

                return `
                    <div class="request-card">
                        <div class="req-name">${escapeHtml(req.name)}</div>
                        <div class="req-email">${escapeHtml(req.email)}</div>
                        ${req.message ? `<div class="req-msg">&ldquo;${escapeHtml(req.message)}&rdquo;</div>` : ''}
                        <div class="req-date">${date}</div>
                        <span class="req-status ${statusClass}">${req.status}</span>
                        ${actions}
                    </div>`;
            }).join('');
        }

        function approveRequest(id) {
            const requests = getRequests();
            const req = requests.find(r => r.id === id);
            if (req) {
                const code = generateCode(req.name);
                req.status = 'approved';
                req.guestCode = code;
                saveRequests(requests);

                // Save the guest code for auth
                const codes = getGuestCodes();
                codes.push(code);
                saveGuestCodes(codes);

                renderRequests();
            }
        }

        function updateRequest(id, newStatus) {
            const requests = getRequests();
            const req = requests.find(r => r.id === id);
            if (req) {
                req.status = newStatus;
                saveRequests(requests);
                renderRequests();
            }
        }

        function adminLogout() {
            const adminPanel = document.getElementById('adminPanel');
            const tabs = document.querySelector('.tabs');

            adminPanel.classList.remove('show');
            tabs.style.display = 'flex';
            document.getElementById('code-panel').classList.add('active');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('[data-panel="code-panel"]').classList.add('active');
            document.getElementById('accessCode').value = '';
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>

</body>

</html>
